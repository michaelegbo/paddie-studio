<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Studio Chat Orchestrator Preview</title>
  <desc id="desc">Chat panel connected to orchestrator node with tool and memory responses.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090c14" />
      <stop offset="100%" stop-color="#131a2d" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)" />
  <rect x="66" y="66" width="1068" height="588" rx="20" fill="rgba(10,15,28,0.88)" stroke="rgba(148,163,184,0.35)" />

  <rect x="98" y="110" width="686" height="500" rx="16" fill="#0f172a" stroke="#334155" />
  <text x="126" y="150" fill="#93c5fd" font-size="16" font-family="Inter, Segoe UI, sans-serif">Chat Input</text>

  <rect x="126" y="176" width="530" height="72" rx="14" fill="#1e293b" />
  <text x="150" y="206" fill="#e2e8f0" font-size="18" font-family="Inter, Segoe UI, sans-serif">User: What orders did Bret place this week?</text>
  <text x="150" y="228" fill="#94a3b8" font-size="14" font-family="Inter, Segoe UI, sans-serif">conversationId: demo-4821</text>

  <rect x="190" y="278" width="560" height="188" rx="14" fill="#0b1220" stroke="#1d4ed8" stroke-opacity="0.7" />
  <text x="214" y="312" fill="#bfdbfe" font-size="16" font-family="Inter, Segoe UI, sans-serif">Orchestrator (gpt-4.1)</text>
  <text x="214" y="346" fill="#e2e8f0" font-size="15" font-family="Inter, Segoe UI, sans-serif">Tool Call 1: HTTP GET /customers?name=Bret</text>
  <text x="214" y="374" fill="#e2e8f0" font-size="15" font-family="Inter, Segoe UI, sans-serif">Tool Call 2: Memory Search user profile + preferences</text>
  <text x="214" y="402" fill="#e2e8f0" font-size="15" font-family="Inter, Segoe UI, sans-serif">Synthesized answer with source fields</text>

  <rect x="126" y="486" width="530" height="92" rx="14" fill="#1e293b" />
  <text x="150" y="520" fill="#f8fafc" font-size="18" font-family="Inter, Segoe UI, sans-serif">Assistant: Bret placed 2 orders totaling $482...</text>
  <text x="150" y="548" fill="#94a3b8" font-size="14" font-family="Inter, Segoe UI, sans-serif">Used tools: http_customer_lookup, memory_router</text>

  <rect x="814" y="110" width="288" height="500" rx="16" fill="#0f172a" stroke="#334155" />
  <text x="838" y="150" fill="#c4b5fd" font-size="16" font-family="Inter, Segoe UI, sans-serif">Connected Tools</text>

  <rect x="838" y="180" width="238" height="76" rx="12" fill="rgba(16,185,129,0.18)" stroke="#34d399" />
  <text x="854" y="216" fill="#d1fae5" font-size="15" font-family="Inter, Segoe UI, sans-serif">HTTP Node</text>
  <text x="854" y="236" fill="#a7f3d0" font-size="13" font-family="Inter, Segoe UI, sans-serif">customer directory API</text>

  <rect x="838" y="272" width="238" height="76" rx="12" fill="rgba(124,58,237,0.2)" stroke="#a78bfa" />
  <text x="854" y="308" fill="#ede9fe" font-size="15" font-family="Inter, Segoe UI, sans-serif">Memory Node</text>
  <text x="854" y="328" fill="#ddd6fe" font-size="13" font-family="Inter, Segoe UI, sans-serif">conversation mode router</text>

  <rect x="838" y="364" width="238" height="76" rx="12" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" />
  <text x="854" y="400" fill="#dbeafe" font-size="15" font-family="Inter, Segoe UI, sans-serif">Output Node</text>
  <text x="854" y="420" fill="#bfdbfe" font-size="13" font-family="Inter, Segoe UI, sans-serif">return structured response</text>

  <rect x="838" y="492" width="238" height="52" rx="999" fill="#2563eb" />
  <text x="908" y="524" fill="#fff" font-size="18" font-weight="600" font-family="Inter, Segoe UI, sans-serif">Run Chat</text>
</svg>
