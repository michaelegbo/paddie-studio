services:
  studio-site:
    container_name: studio-site
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/site/Dockerfile
    environment:
      PORT: 3000
    expose:
      - "3000"
    networks:
      - default

  studio-web:
    container_name: studio-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "80"
    networks:
      - default

  studio-server:
    container_name: studio-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 4300
      PADDIE_API_BASE_URL: https://api.paddie.io
      PUBLIC_BASE_URL: https://studio.paddie.io
    expose:
      - "4300"
    networks:
      - default

  studio-edge:
    container_name: studio-edge
    restart: unless-stopped
    image: nginx:1.29-alpine
    depends_on:
      - studio-site
      - studio-web
      - studio-server
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - rmn-shared

networks:
  rmn-shared:
    external: true
    name: ${RMN_SHARED_DOCKER_NETWORK:-rmn-docker-source_rmn-network}
